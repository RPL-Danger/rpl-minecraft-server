services:
  mc:
    image: itzg/minecraft-server
    restart: unless-stopped
    environment:
      EULA: "true"
      TYPE: "FABRIC"
      ONLINE_MODE: "false"
      DIFFICULTY: "normal"
      MAX_PLAYERS: 50
      INIT_MEMORY: "2G"
      MAX_MEMORY: "8G"
    ports:
      - "25565:25565"
      - "19132:19132/udp"
      - "8080:8080"
    volumes:
      - ./:/data/:z
